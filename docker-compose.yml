services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - app_db:/var/www/html/database
    networks:
      - chatbot

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - app
    networks:
      - chatbot

volumes:
  app_storage:
  app_db:

networks:
  chatbot:
    driver: bridge
